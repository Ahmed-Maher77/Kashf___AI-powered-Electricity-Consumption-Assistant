services:
  server:
    image: ahmedmaher77/kashf-server
    build:
      context: ./server
    container_name: kashf-server
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env
    restart: unless-stopped

  client:
    image: ahmedmaher77/kashf-client
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: ""
    container_name: kashf-client
    ports:
      - "8080:80"
    depends_on:
      - server
    restart: unless-stopped
