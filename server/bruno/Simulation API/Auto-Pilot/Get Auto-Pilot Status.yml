info:
  name: Get Auto-Pilot Status
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/api/simulations/{{simulationId}}/auto-pilot"
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("Status is 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Has enabled flag", function() {
          expect(res.body.data).to.have.property("enabled");
        });

settings:
  encodeUrl: true

docs: |-
  # Get Auto-Pilot Status

  Returns the current auto-pilot state (enabled/disabled), goal settings,
  and the number of actions taken so far.
