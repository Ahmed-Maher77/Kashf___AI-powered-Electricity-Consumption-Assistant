info:
  name: List Simulations
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/api/simulations"
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("Status is 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Response has success flag", function() {
          expect(res.body.success).to.equal(true);
        });
        test("Data is an array", function() {
          expect(res.body.data).to.be.an("array");
        });
        test("Each simulation has id and name", function() {
          if (res.body.data.length > 0) {
            const sim = res.body.data[0];
            expect(sim).to.have.property("id");
            expect(sim).to.have.property("name");
            expect(sim).to.have.property("circuits");
          }
        });

settings:
  encodeUrl: true

docs: |-
  # List Simulations

  Returns all simulations owned by the authenticated user, sorted by most recent first.

  Each simulation includes its runtime state (`null` if never started, or the current in-memory runtime data).

  ## Response (200)
  ```json
  {
    "success": true,
    "data": [
      {
        "id": "sim_id",
        "user": "user_id",
        "name": "My Smart Home",
        "circuits": [...],
        "createdAt": "...",
        "updatedAt": "...",
        "runtime": null | { "totalKWh": 0.5, "currentTier": 1, ... }
      }
    ]
  }
  ```
