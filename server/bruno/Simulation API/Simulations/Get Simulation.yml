info:
  name: Get Simulation
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/api/simulations/{{simulationId}}"
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("Status is 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Response has success flag", function() {
          expect(res.body.success).to.equal(true);
        });
        test("Returns requested simulation", function() {
          expect(res.body.data).to.have.property("id");
          expect(res.body.data).to.have.property("name");
          expect(res.body.data).to.have.property("circuits");
        });
        test("Runtime is present (null or object)", function() {
          expect(res.body.data).to.have.property("runtime");
        });
        test("Status is 404 for non-existent simulation", function() {
          // This will fail for invalid IDs — expected behavior
        });

settings:
  encodeUrl: true

docs: |-
  # Get Simulation

  Retrieves a single simulation by ID, including its full circuit/device configuration and current runtime state.

  ## Path Parameters
  - `id` (string, required): Simulation ID

  ## Response (200)
  ```json
  {
    "success": true,
    "data": {
      "id": "sim_id",
      "user": "user_id",
      "name": "My Smart Home",
      "circuits": [...],
      "createdAt": "...",
      "updatedAt": "...",
      "runtime": {
        "totalKWh": 0.5,
        "currentTier": 1,
        "currentLoadW": 215,
        "estimatedBill": 0.29,
        "tickCount": 50,
        "running": true,
        "startedAt": "2026-06-09T..."
      }
    }
  }
  ```

  ## Error Responses
  - `404`: Simulation not found
  - `403`: Not authorized (simulation belongs to another user)
