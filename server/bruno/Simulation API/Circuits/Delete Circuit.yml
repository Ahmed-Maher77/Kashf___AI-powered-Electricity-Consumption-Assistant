info:
  name: Delete Circuit
  type: http
  seq: 3

http:
  method: DELETE
  url: "{{baseUrl}}/api/simulations/{{simulationId}}/circuits/{{circuitId}}"
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("Status is 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Circuit was removed", function() {
          const circuits = res.body.data.circuits;
          const removed = circuits.find(c => c._id === bru.getVar("circuitId"));
          expect(removed).to.be.undefined;
        });

settings:
  encodeUrl: true

docs: |-
  # Delete Circuit

  Removes a circuit and all its devices from a simulation.

  ## Path Parameters
  - `id` (string, required): Simulation ID
  - `cid` (string, required): Circuit ID

  ## Response (200)
  Returns the full simulation document with the circuit removed.

  ## Notes
  - All devices within the circuit are also deleted
  - If the engine is running, the config is synced to remove the circuit from the tick loop
