info:
  name: Register
  type: http
  seq: 0

http:
  method: POST
  url: "{{baseUrl}}/api/auth/register"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "username": "testuser",
        "email": "{{email}}",
        "password": "{{password}}",
        "repassword": "{{password}}"
      }
  auth:
    type: none

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 201) {
          const token = res.body.data.accessToken;
          bru.setEnvVar("authToken", token);
          bru.setVar("authToken", token);
        }
    - type: tests
      code: |-
        test("Status is 201", function() {
          expect(res.status).to.equal(201);
        });
        test("Response has success flag", function() {
          expect(res.body).to.have.property("success");
          expect(res.body.success).to.equal(true);
        });
        test("Response has user data and access token", function() {
          expect(res.body.data).to.have.property("user");
          expect(res.body.data).to.have.property("accessToken");
        });
        test("User has correct fields", function() {
          expect(res.body.data.user).to.have.property("username");
          expect(res.body.data.user).to.have.property("email");
          expect(res.body.data.user).to.have.property("role");
        });

settings:
  encodeUrl: true

docs: |-
  # Register

  Creates a new user account and returns an access token.

  The after-response script automatically stores the token in the `authToken` environment variable for use in subsequent requests.

  ## Request Body
  - `username` (string, required): Display name (3-200 chars, alphanumeric + spaces + hyphens)
  - `email` (string, required): Valid email address
  - `password` (string, required): Min 6 characters
  - `repassword` (string, required): Must match `password`

  ## Response (201)
  ```json
  {
    "success": true,
    "data": {
      "user": {
        "_id": "...",
        "username": "testuser",
        "email": "test@example.com",
        "role": "user"
      },
      "accessToken": "jwt_token_here"
    }
  }
  ```

  ## Error Responses
  - `400`: Validation failed or passwords don't match
  - `409`: Email or username already in use
