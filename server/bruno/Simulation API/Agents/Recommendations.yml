info:
  name: Recommendations
  type: http
  seq: 5

http:
  method: GET
  url: "{{baseUrl}}/api/simulations/{{simulationId}}/recommendations"
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("Status is 200", function() {
          expect(res.status).to.equal(200);
        });
        test("Has analysis section", function() {
          expect(res.body.data).to.have.property("analysis");
        });
        test("Has generatedAt timestamp", function() {
          expect(res.body.data).to.have.property("generatedAt");
        });

settings:
  encodeUrl: true

docs: |-
  # Recommendations

  Smart Recommendations Engine. Analyzes the current simulation state
  (load distribution, tier proximity, high-wattage devices, essential vs
  non-essential) and calls Groq to generate structured, prioritized
  recommendations.

  ## How It Works
  1. Computes load distribution per circuit
  2. Identifies high-wattage active devices (>1000W)
  3. Computes tier progress (how close to next tier)
  4. Sends structured analysis to Groq
  5. Returns categorized findings + quick wins + priority level

  ## Response
  ```json
  {
    "success": true,
    "data": {
      "analysis": { "totalLoadW": 3700, "tier": 3, ... },
      "recommendations": {
        "findings": [
          { "category": "peak", "title": "...", "description": "...", "impact": "...", "suggestion": "..." }
        ],
        "quickWins": ["..."],
        "priority": "high"
      },
      "generatedAt": "2026-06-10T..."
    }
  }
  ```

  ## Requirements
  - `GROQ_API_KEY` and `GROQ_MODEL` must be set in `.env`
  - Works with or without engine running
